<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Daily — Celestial Mechanics × World Events</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-eclipse: #E84545;
            --color-conjunction: #C9A96E;
            --color-opposition: #E8A545;
            --color-square: #5B8FB9;
            --color-retrograde: #8B7EC7;
            --color-equinox: #7ECBA1;
            --color-text: #E8E6F0;
            --color-text-muted: #9B99A8;
            --color-border: rgba(201, 169, 110, 0.15);
            --color-bg: #06050A;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(175deg, #06050A 0%, #0A0814 30%, #0D0B18 60%, #07060C 100%);
            color: var(--color-text);
            font-family: 'Source Serif 4', serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body {
            background-attachment: fixed;
        }

        /* Starfield */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .star.twinkle {
            animation: twinkle linear infinite;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
        }

        @keyframes float-up {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .orb-red {
            top: -10%;
            right: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 30% 30%, rgba(232, 69, 69, 0.15), rgba(232, 69, 69, 0.02) 70%);
            animation: float-up 8s ease-in-out infinite;
        }

        .orb-purple {
            bottom: -10%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 70% 70%, rgba(139, 126, 199, 0.12), rgba(139, 126, 199, 0) 70%);
            animation: float-up 12s ease-in-out infinite reverse;
        }

        /* Main content wrapper */
        #root {
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            padding: 60px 20px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .header-title {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #E8E6F0, #C9A96E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 20px rgba(201, 169, 110, 0.3); filter: drop-shadow(0 0 8px rgba(201, 169, 110, 0.2)); }
            50% { text-shadow: 0 0 40px rgba(201, 169, 110, 0.6); filter: drop-shadow(0 0 16px rgba(201, 169, 110, 0.4)); }
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--color-text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .header-manifesto {
            font-size: 18px;
            color: var(--color-text);
            margin-bottom: 16px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }

        .header-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--color-text-muted);
            letter-spacing: 1px;
        }

        /* Navigation */
        .nav-section {
            margin: 40px 0;
            padding: 0 20px;
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--color-text-muted);
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
        }

        .pill-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .pill {
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--color-text-muted);
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
            white-space: nowrap;
        }

        .pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(201, 169, 110, 0.4);
        }

        .pill.active {
            background: rgba(201, 169, 110, 0.2);
            border-color: #C9A96E;
            color: #C9A96E;
        }

        /* Type pills with colors */
        .pill.type-eclipse { --pill-color: var(--color-eclipse); }
        .pill.type-eclipse.active {
            background: rgba(232, 69, 69, 0.15);
            border-color: var(--color-eclipse);
            color: var(--color-eclipse);
        }

        .pill.type-conjunction { --pill-color: var(--color-conjunction); }
        .pill.type-conjunction.active {
            background: rgba(201, 169, 110, 0.15);
            border-color: var(--color-conjunction);
            color: var(--color-conjunction);
        }

        .pill.type-opposition { --pill-color: var(--color-opposition); }
        .pill.type-opposition.active {
            background: rgba(232, 165, 69, 0.15);
            border-color: var(--color-opposition);
            color: var(--color-opposition);
        }

        .pill.type-square { --pill-color: var(--color-square); }
        .pill.type-square.active {
            background: rgba(91, 143, 185, 0.15);
            border-color: var(--color-square);
            color: var(--color-square);
        }

        .pill.type-retrograde { --pill-color: var(--color-retrograde); }
        .pill.type-retrograde.active {
            background: rgba(139, 126, 199, 0.15);
            border-color: var(--color-retrograde);
            color: var(--color-retrograde);
        }

        .pill.type-equinox { --pill-color: var(--color-equinox); }
        .pill.type-equinox.active {
            background: rgba(126, 203, 161, 0.15);
            border-color: var(--color-equinox);
            color: var(--color-equinox);
        }

        /* Search */
        .search-container {
            position: relative;
            margin: 30px 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--color-text-muted);
        }

        .search-input:focus {
            outline: none;
            border-color: #C9A96E;
            background: rgba(201, 169, 110, 0.08);
        }

        /* Results counter */
        .results-counter {
            text-align: center;
            font-size: 12px;
            color: var(--color-text-muted);
            margin: 20px 0 30px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Glossary */
        .glossary-toggle {
            margin: 30px 20px;
            text-align: center;
        }

        .glossary-btn {
            padding: 10px 24px;
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid rgba(201, 169, 110, 0.3);
            color: #C9A96E;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .glossary-btn:hover {
            background: rgba(201, 169, 110, 0.2);
            border-color: #C9A96E;
        }

        .glossary-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .glossary-content {
            background: linear-gradient(135deg, rgba(10, 8, 20, 0.95), rgba(13, 11, 24, 0.95));
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 40px;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .glossary-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 24px;
            transition: color 0.3s ease;
        }

        .glossary-close:hover {
            color: var(--color-text);
        }

        .glossary-section {
            margin-bottom: 40px;
        }

        .glossary-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glossary-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
        }

        .glossary-item:last-child {
            border-bottom: none;
        }

        .glossary-term {
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        .glossary-definition {
            color: var(--color-text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Events list */
        .events-container {
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, rgba(201, 169, 110, 0.3), rgba(232, 69, 69, 0.2), rgba(139, 126, 199, 0.2), rgba(201, 169, 110, 0.1));
        }

        .event-item {
            position: relative;
            margin-bottom: 50px;
            display: flex;
            gap: 30px;
        }

        .timeline-node {
            position: absolute;
            left: -32px;
            top: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid currentColor;
            background: rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .event-item:hover .timeline-node {
            transform: scale(1.3);
            background: currentColor;
            box-shadow: 0 0 15px currentColor;
        }

        .event-year {
            min-width: 80px;
            font-size: 28px;
            font-weight: 600;
            color: currentColor;
            font-family: 'IBM Plex Mono', monospace;
            text-align: right;
            padding-top: 10px;
        }

        .event-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: currentColor;
            opacity: 0.5;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(201, 169, 110, 0.4);
            box-shadow: 0 8px 32px rgba(201, 169, 110, 0.1);
        }

        .event-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .event-type-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .badge-eclipse { background: rgba(232, 69, 69, 0.2); color: var(--color-eclipse); }
        .badge-conjunction { background: rgba(201, 169, 110, 0.2); color: var(--color-conjunction); }
        .badge-opposition { background: rgba(232, 165, 69, 0.2); color: var(--color-opposition); }
        .badge-square { background: rgba(91, 143, 185, 0.2); color: var(--color-square); }
        .badge-retrograde { background: rgba(139, 126, 199, 0.2); color: var(--color-retrograde); }
        .badge-equinox { background: rgba(126, 203, 161, 0.2); color: var(--color-equinox); }

        .event-cycle-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(139, 126, 199, 0.15);
            color: #8B7EC7;
        }

        .event-headline {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .event-celestial {
            font-size: 12px;
            color: var(--color-text-muted);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px;
        }

        .event-expand-hint {
            font-size: 11px;
            color: rgba(201, 169, 110, 0.6);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            margin-top: 12px;
        }

        .chevron {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .event-card.expanded .chevron {
            transform: rotate(180deg);
        }

        .event-expanded {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(201, 169, 110, 0.2);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .expanded-section {
            margin-bottom: 16px;
        }

        .expanded-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: currentColor;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 6px;
            display: block;
        }

        .expanded-text {
            font-size: 13px;
            color: var(--color-text-muted);
            line-height: 1.7;
        }

        .cosmic-link {
            padding-left: 12px;
            border-left: 3px solid currentColor;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            border-left: 3px solid currentColor;
        }

        .cosmic-link .expanded-label {
            color: currentColor;
        }

        .cosmic-link .expanded-text {
            color: var(--color-text);
            font-style: italic;
        }

        /* Color coded event items */
        .event-item.type-eclipse { color: var(--color-eclipse); }
        .event-item.type-conjunction { color: var(--color-conjunction); }
        .event-item.type-opposition { color: var(--color-opposition); }
        .event-item.type-square { color: var(--color-square); }
        .event-item.type-retrograde { color: var(--color-retrograde); }
        .event-item.type-equinox { color: var(--color-equinox); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-muted);
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 12px;
        }

        /* Stats */
        .stats {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
        }

        /* Footer */
        .footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid var(--color-border);
            color: var(--color-text-muted);
            font-size: 12px;
            line-height: 1.8;
        }

        .footer-disclaimer {
            margin-bottom: 20px;
            font-style: italic;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer-credit {
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-title {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .header-manifesto {
                font-size: 16px;
            }

            .event-item {
                flex-direction: column;
                gap: 15px;
            }

            .event-year {
                min-width: auto;
                text-align: left;
            }

            .timeline {
                padding-left: 30px;
            }

            .timeline-node {
                left: -24px;
            }

            .event-headline {
                font-size: 16px;
            }

            .orb {
                filter: blur(80px);
                opacity: 0.3;
            }

            .glossary-content {
                padding: 30px 24px;
                max-width: 90vw;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(201, 169, 110, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 169, 110, 0.5);
        }

        /* Selection */
        ::selection {
            background: rgba(201, 169, 110, 0.3);
            color: var(--color-text);
        }
    </style>
</head>

    <div class="orb orb-red"></div>
    <div class="orb orb-purple"></div>

            { id: "Jupiter-Saturn", label: "Jupiter-Saturn", color: "#C9A96E" },
            { id: "Uranus-Pluto", label: "Uranus-Pluto", color: "#E8A545" },
            { id: "Eclipse", label: "Eclipse", color: "#E84545" },
            { id: "Other", label: "Other", color: "#7ECBA1" }
        ];

        const GLOSSARY_DATA = {
            aspects: [
                {
                    term: "Conjunction (☌)",
                    def: "Two planets meet at the same point. A cosmic handshake — a new cycle begins."
                },
                {
                    term: "Opposition (☍)",
                    def: "180° apart. Maximum tension. The cycle reaches its crisis point."
                },
                {
                    term: "Square (□)",
                    def: "90° apart. Friction, forced action. Something has to change."
                },
                {
                    term: "Eclipse (◑)",
                    def: "Sun, Moon, Earth align precisely. Supercharges the sign it falls in. Exposes hidden things."
                },
                {
                    term: "Retrograde (℞)",
                    def: "Planet appears to move backward. Its themes go haywire — delays, miscommunication, past resurfacing."
                }
            ],
            planets: [
                { term: "Saturn", def: "Structure, limits, authority, consequences. The planet of hard reality." },
                { term: "Pluto", def: "Power, transformation, secrets, the unconscious. What's hidden beneath the surface." },
                { term: "Jupiter", def: "Expansion, belief, fortune, excess. The amplifier — makes everything bigger." },
                { term: "Neptune", def: "Dreams, illusion, dissolution, deception. The dissolver of boundaries." },
                { term: "Uranus", def: "Revolution, disruption, technology, sudden change. The lightning bolt." },
                { term: "Mars", def: "Action, conflict, aggression, energy. The warrior." },
                { term: "Venus", def: "Value, beauty, diplomacy, money. What we desire." },
                { term: "Mercury", def: "Communication, technology, travel, information. The messenger." }
            ],
            cycles: [
                {
                    term: "Saturn-Pluto (~33-38 yrs)",
                    def: "Power structures built and destroyed. WWI, Cold War, AIDS, COVID — all began at Saturn-Pluto conjunctions."
                },
                {
                    term: "Saturn-Neptune (~36 yrs)",
                    def: "Idealism meets reality. Berlin Wall fell 4 days before exact conjunction in 1989."
                },
                {
                    term: "Jupiter-Saturn (~20 yrs)",
                    def: "The 'Great Conjunction.' Generational shifts in economics and social order."
                },
                {
                    term: "Uranus-Pluto (~113-141 yrs)",
                    def: "The revolution cycle. 1960s counterculture, 2010s Arab Spring/Occupy."
                }
            ]
        };

        // Starfield generation
        function generateStarfield() {
            const starfield = document.getElementById('starfield');
            if (!starfield) return;

            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star twinkle';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = (Math.random() * 3) + 's';
                star.style.animationDuration = (2 + Math.random() * 2) + 's';
                starfield.appendChild(star);
            }
        }

        // Main app component
        function CosmosDaily() {
            const [expandedId, setExpandedId] = useState(null);
            const [selectedDecade, setSelectedDecade] = useState('all');
            const [selectedCycle, setSelectedCycle] = useState('all');
            const [selectedType, setSelectedType] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [showGlossary, setShowGlossary] = useState(false);

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            // Filter logic
            const filteredEvents = useMemo(() => {
                return EVENTS.filter(event => {
                    const decade = Math.floor(event.year / 10) * 10;
                    const decadeMatch = selectedDecade === 'all' || `${decade}s` === selectedDecade;
                    const cycleMatch = selectedCycle === 'all' || event.cycle === selectedCycle;
                    const typeMatch = selectedType === 'all' || event.type === selectedType;
                    const searchMatch = searchQuery === '' ||
                        event.headline.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        event.celestialEvent.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        event.cosmicLink.toLowerCase().includes(searchQuery.toLowerCase());

                    return decadeMatch && cycleMatch && typeMatch && searchMatch;
                }).sort((a, b) => a.year - b.year);
            }, [selectedDecade, selectedCycle, selectedType, searchQuery]);

            const getColorClass = (type) => `type-${type}`;
            const getColorStyle = (type) => {
                const colorMap = {
                    eclipse: '#E84545',
                    conjunction: '#C9A96E',
                    opposition: '#E8A545',
                    square: '#5B8FB9',
                    retrograde: '#8B7EC7',
                    equinox: '#7ECBA1'
                };
                return colorMap[type] || '#C9A96E';
            };

            const getEventTypeLabel = (type) => {
                return type.charAt(0).toUpperCase() + type.slice(1);
            };

            useEffect(() => {
                generateStarfield();
            }, []);

            return (
                <div style={{ position: 'relative', zIndex: 1 }}>
                    {/* Header */}
                    <div className="header">
                        <h1 className="header-title">COSMOS DAILY</h1>
                        <div className="header-subtitle">CELESTIAL MECHANICS × WORLD EVENTS</div>
                        <p className="header-manifesto">
                            Sixty years of planetary alignments mapped against the events that shaped the world.
                        </p>
                        <div className="header-date">{dateStr}</div>
                    </div>

                    {/* Glossary Button */}
                    <div className="glossary-toggle">
                        <button className="glossary-btn" onClick={() => setShowGlossary(!showGlossary)}>
                            📖 Cosmic Glossary (Beginner Layer)
                        </button>
                    </div>

                    {/* Glossary Modal */}
                    {showGlossary && (
                        <div className="glossary-modal" onClick={() => setShowGlossary(false)}>
                            <div className="glossary-content" onClick={e => e.stopPropagation()}>
                                <button className="glossary-close" onClick={() => setShowGlossary(false)}>×</button>

                                <div className="glossary-section">
                                    <div className="glossary-section-title">Aspect Types (ELI5)</div>
                                    {GLOSSARY_DATA.aspects.map((item, i) => (
                                        <div key={i} className="glossary-item">
                                            <div className="glossary-term">{item.term}</div>
                                            <div className="glossary-definition">{item.def}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="glossary-section">
                                    <div className="glossary-section-title">Planets (What They Rule)</div>
                                    {GLOSSARY_DATA.planets.map((item, i) => (
                                        <div key={i} className="glossary-item">
                                            <div className="glossary-term">{item.term}</div>
                                            <div className="glossary-definition">{item.def}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="glossary-section">
                                    <div className="glossary-section-title">Major Cycles (ELI5)</div>
                                    {GLOSSARY_DATA.cycles.map((item, i) => (
                                        <div key={i} className="glossary-item">
                                            <div className="glossary-term">{item.term}</div>
                                            <div className="glossary-definition">{item.def}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation */}
                    <div className="container">
                        {/* Decades */}
                        <div className="nav-section">
                            <span className="nav-label">Filter by Decade</span>
                            <div className="pill-group">
                                {['all', '1960s', '1980s', '1990s', '2000s', '2010s', '2020s'].map(decade => (
                                    <button
                                        key={decade}
                                        className={`pill ${selectedDecade === decade ? 'active' : ''}`}
                                        onClick={() => setSelectedDecade(decade)}
                                    >
                                        {decade === 'all' ? 'All Decades' : decade}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Cycles */}
                        <div className="nav-section">
                            <span className="nav-label">Filter by Cycle</span>
                            <div className="pill-group">
                                <button
                                    className={`pill ${selectedCycle === 'all' ? 'active' : ''}`}
                                    onClick={() => setSelectedCycle('all')}
                                >
                                    All Cycles
                                </button>
                                {CYCLES.map(cycle => (
                                    <button
                                        key={cycle.id}
                                        className={`pill ${selectedCycle === cycle.id ? 'active' : ''}`}
                                        onClick={() => setSelectedCycle(cycle.id)}
                                    >
                                        {cycle.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Event Types */}
                        <div className="nav-section">
                            <span className="nav-label">Filter by Type</span>
                            <div className="pill-group">
                                <button
                                    className={`pill ${selectedType === 'all' ? 'active' : ''}`}
                                    onClick={() => setSelectedType('all')}
                                >
                                    All Types
                                </button>
                                {['eclipse', 'conjunction', 'opposition', 'square', 'retrograde', 'equinox'].map(type => (
                                    <button
                                        key={type}
                                        className={`pill type-${type} ${selectedType === type ? 'active' : ''}`}
                                        onClick={() => setSelectedType(type)}
                                    >
                                        {getEventTypeLabel(type)}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Search */}
                        <div className="search-container">
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Search events, celestial positions, cosmic links..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        {/* Results Counter */}
                        <div className="results-counter">
                            Showing {filteredEvents.length} of {EVENTS.length} events
                        </div>
                    </div>

                    {/* Events */}
                    <div className="events-container">
                        {filteredEvents.length > 0 ? (
                            <div className="container">
                                <div className="timeline">
                                    {filteredEvents.map(event => (
                                        <div
                                            key={event.id}
                                            className={`event-item ${getColorClass(event.type)}`}
                                            style={{ color: getColorStyle(event.type) }}
                                        >
                                            <div className="timeline-node"></div>
                                            <div className="event-year">{event.year}</div>
                                            <div
                                                className={`event-card ${expandedId === event.id ? 'expanded' : ''}`}
                                                onClick={() => setExpandedId(expandedId === event.id ? null : event.id)}
                                                style={{
                                                    borderLeftColor: getColorStyle(event.type),
                                                    color: getColorStyle(event.type)
                                                }}
                                            >
                                                <div className="event-meta">
                                                    <span className={`event-type-badge badge-${event.type}`}>
                                                        {getEventTypeLabel(event.type)}
                                                    </span>
                                                    <span className="event-cycle-badge">{event.cycle}</span>
                                                </div>
                                                <h3 className="event-headline">{event.headline}</h3>
                                                <div className="event-celestial">{event.celestialEvent}</div>
                                                <div className="event-expand-hint">
                                                    Click to expand
                                                    <span className="chevron">▼</span>
                                                </div>

                                                {expandedId === event.id && (
                                                    <div className="event-expanded">
                                                        <div className="expanded-section">
                                                            <span className="expanded-label">What Happened</span>
                                                            <div className="expanded-text">{event.whatHappened}</div>
                                                        </div>
                                                        <div className="expanded-section cosmic-link">
                                                            <span className="expanded-label">Cosmic Link</span>
                                                            <div className="expanded-text">{event.cosmicLink}</div>
                                                        </div>
                                                        <div className="expanded-section">
                                                            <span className="expanded-label">Cycle Context</span>
                                                            <div className="expanded-text">{event.cycleContext}</div>
                                                        </div>
                                                        <div className="expanded-section">
                                                            <span className="expanded-label" style={{ color: '#9B99A8' }}>Date & Position</span>
                                                            <div className="expanded-text">
                                                                <div>{event.date}</div>
                                                                <div>{event.position}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="empty-state">
                                <div className="empty-state-text">No events match your filters.</div>
                                <div style={{ fontSize: '12px', color: '#9B99A8' }}>Try adjusting your search or filters.</div>
                            </div>
                        )}
                    </div>

                    {/* Stats & Footer */}
                    <div className="container">
                        <div className="stats">
                            Tracking 33+ world events across 6 planetary cycles · 1965–2026
                        </div>
                        <div className="footer">
                            <div className="footer-disclaimer">
                                Astrology is a lens, not a law. We present celestial events alongside world events as a framework for reflection — not as causal claims or predictions.
                            </div>
                            <div className="footer-credit">
                                COSMOS DAILY · FOR EXPLORATION & PERSPECTIVE
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CosmosDaily />);
    </script>
</body>
</html>
