<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07060D;
  --gold: #C9A96E;
  --red: #E84545;
  --violet: #8B7EC7;
  --steel: #4A90D9;
  --orange: #E07A2F;
  --green: #7ECBA1;
  --teal: #6B9E9E;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --text: #E8E4DC;
  --text-dim: rgba(232,228,220,0.5);
  --serif: 'Source Serif 4', Georgia, serif;
  --mono: 'IBM Plex Mono', monospace;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
}

/* Starfield canvas */
#starfield {
  position: fixed; inset: 0; z-index: 0;
}

/* Ambient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 { width: 600px; height: 600px; background: rgba(232,69,69,0.06); top: -200px; left: -100px; }
.orb-2 { width: 500px; height: 500px; background: rgba(155,143,212,0.05); bottom: -150px; right: -100px; }
.orb-3 { width: 400px; height: 400px; background: rgba(201,169,110,0.04); top: 50%; left: 60%; }

/* Main canvas */
#mapCanvas {
  position: fixed; inset: 0; z-index: 1;
  cursor: grab;
}
#mapCanvas.dragging { cursor: grabbing; }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
  background: linear-gradient(180deg, rgba(7,6,13,0.92) 0%, rgba(7,6,13,0.6) 70%, transparent 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.header-brand {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
}
.header-title {
  font-family: var(--mono);
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 5px;
  color: var(--text-dim);
  text-transform: uppercase;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.header-back {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.3s;
  letter-spacing: 1px;
}
.header-back:hover { color: var(--gold); }

/* Legend */
.legend {
  position: fixed;
  bottom: 80px;
  left: 28px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 6px;
  opacity: 0.7;
  transition: opacity 0.3s;
}
.legend:hover { opacity: 1; }
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Filter chips */
.filters {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(7,6,13,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 40px;
}
.filter-chip {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.filter-chip:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}
.filter-chip.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,169,110,0.1);
}

/* Tooltip */
.tooltip {
  position: fixed;
  z-index: 200;
  pointer-events: none;
  background: rgba(7,6,13,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 14px 18px;
  max-width: 320px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
}
.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}
.tooltip-year {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.tooltip-celestial {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.tooltip-world {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text);
}

/* Detail panel */
.detail-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 420px;
  max-width: 90vw;
  z-index: 150;
  background: rgba(7,6,13,0.96);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-left: 1px solid rgba(255,255,255,0.06);
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.detail-panel.open {
  transform: translateX(0);
}
.detail-panel-inner {
  padding: 28px;
  flex: 1;
}
.detail-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  z-index: 10;
}
.detail-close:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.detail-image-wrap {
  position: relative;
  width: calc(100% + 56px);
  margin: -28px -28px 0 -28px;
  height: 200px;
  overflow: hidden;
}
.detail-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.detail-image-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(7,6,13,0) 40%, rgba(7,6,13,0.95) 100%);
  pointer-events: none;
}
.detail-image-year {
  position: absolute;
  bottom: 12px; left: 16px;
  z-index: 2;
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 200;
  letter-spacing: 2px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.detail-accent {
  width: 100%;
  height: 3px;
  margin-bottom: 24px;
  border-radius: 2px;
}
.detail-year {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.detail-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.detail-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 4px;
  margin-bottom: 12px;
}
.detail-celestial {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 300;
  margin-bottom: 8px;
  opacity: 0.8;
}
.detail-world {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 6px;
}
.detail-category {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.detail-section {
  margin-bottom: 20px;
}
.detail-section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.detail-section-text {
  font-family: var(--serif);
  font-size: 14px;
  line-height: 1.65;
  color: rgba(232,228,220,0.85);
}
/* Cosmic Link — gold accent */
.detail-section-cosmic {
  background: rgba(201,169,110,0.07);
  border-left: 3px solid #C9A96E;
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
}
.detail-section-cosmic .detail-section-label { color: #C9A96E; }
.detail-section-cosmic .detail-section-text { color: rgba(201,169,110,0.9); font-style: italic; }
/* Historical Parallel — subtle surface */
.detail-section-parallel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 14px 18px;
  border-radius: 8px;
}
/* Ripple Effects — red accent with timeline dots */
.detail-section-ripple .detail-section-label { color: #E84545; }
.detail-ripple-timeline {
  position: relative;
  padding-left: 24px;
}
.detail-ripple-timeline::before {
  content: '';
  position: absolute;
  left: 6px; top: 4px; bottom: 4px;
  width: 1px;
  background: linear-gradient(to bottom, #E84545, rgba(232,69,69,0.1));
}
.detail-ripple {
  position: relative;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  color: rgba(232,228,220,0.75);
  letter-spacing: 0.02em;
  padding: 6px 0;
}
.detail-ripple::before {
  content: '';
  position: absolute;
  left: -22px; top: 12px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #E84545;
  box-shadow: 0 0 8px rgba(232,69,69,0.5);
}
.detail-ripple:first-child::before {
  width: 9px; height: 9px;
  left: -23px; top: 11px;
  box-shadow: 0 0 12px rgba(232,69,69,0.7);
}
.detail-ripple:last-child::before {
  background: rgba(232,69,69,0.3);
  box-shadow: 0 0 6px rgba(232,69,69,0.2);
}

/* Zoom indicator */
.zoom-indicator {
  position: fixed;
  bottom: 80px;
  right: 28px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
}
.zoom-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(7,6,13,0.8);
  backdrop-filter: blur(8px);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.zoom-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.zoom-level {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* View toggle */
.view-toggle {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  gap: 2px;
  background: rgba(7,6,13,0.85);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.view-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: rgba(232,228,220,0.4);
  cursor: pointer;
  transition: all 0.3s ease;
}
.view-btn.active {
  background: rgba(201,169,110,0.12);
  color: var(--gold);
}
.view-btn:hover:not(.active) {
  color: rgba(232,228,220,0.7);
}

/* Scrollbar */
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-track { background: transparent; }
.detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header-title { font-size: 10px; letter-spacing: 3px; }
  .detail-panel { width: 100%; max-width: 100%; }
  .legend { display: none; }
  .filters { gap: 4px; padding: 6px 10px; }
  .filter-chip { font-size: 9px; padding: 5px 10px; }
}
</style>
</head>

// ── COLOR MAP ──
const TYPE_COLORS = {
  eclipse: '#E84545',
  conjunction: '#C9A96E',
  opposition: '#E07A2F',
  square: '#8B7EC7',
  retrograde: '#4A90D9',
  equinox: '#7ECBA1',
  ingress: '#6B9E9E'
};

const TYPE_LABELS = {
  eclipse: 'Eclipse',
  conjunction: 'Conjunction',
  opposition: 'Opposition',
  square: 'Square',
  retrograde: 'Retrograde',
  equinox: 'Equinox',
  ingress: 'Ingress'
};

// ── ERA DEFINITIONS ──
const ERAS = [
  { name: 'Ancient', min: -500, max: 500, ring: 1 },
  { name: 'Medieval', min: 500, max: 1500, ring: 2 },
  { name: 'Pre-Modern', min: 1500, max: 1900, ring: 3 },
  { name: 'Modern', min: 1900, max: 2000, ring: 4 },
  { name: '21st Century', min: 2000, max: 2100, ring: 5 }
];

function getEra(year) {
  for (let i = ERAS.length - 1; i >= 0; i--) {
    if (year >= ERAS[i].min) return ERAS[i];
  }
  return ERAS[0];
}

// ── STARFIELD ──
const sfCanvas = document.getElementById('starfield');
const sfCtx = sfCanvas.getContext('2d');
let stars = [];

function initStarfield() {
  sfCanvas.width = window.innerWidth;
  sfCanvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((sfCanvas.width * sfCanvas.height) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * sfCanvas.width,
      y: Math.random() * sfCanvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.6 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

function drawStarfield(time) {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  for (const s of stars) {
    const a = s.a * (0.6 + 0.4 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset));
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(232,228,220,${a})`;
    sfCtx.fill();
  }
}

// ── MAIN MAP CANVAS ──
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
let zoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY, panStartX, panStartY;
let hoveredEvent = null;
let selectedEvent = null;
let activeFilters = new Set();
let rotationAngle = 0;
let eventNodes = [];
let currentView = 'radial';

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  cx = W / 2;
  cy = H / 2 + 15;
  sfCanvas.width = W;
  sfCanvas.height = H;
  initStarfield();
  computeNodes();
}

// ── COMPUTE NODE POSITIONS ──
function computeNodes() {
  const baseRadius = Math.min(W, H) * 0.43;
  const ringGap = baseRadius / 6;

  eventNodes = EVENTS.map(ev => {
    const era = getEra(ev.year);
    const ringRadius = ringGap * (era.ring + 0.5);
    // Angle: map year within era to 0..2PI, starting from top (-PI/2)
    const eraSpan = era.max - era.min;
    const yearFrac = (ev.year - era.min) / eraSpan;
    const angle = -Math.PI / 2 + yearFrac * Math.PI * 2;

    // Add slight jitter to prevent overlap
    const jitter = (hashCode(ev.id) % 20 - 10) * 0.003;
    const radiusJitter = (hashCode(ev.id + 'r') % 20 - 10) * 0.01 * ringGap;

    const r = ringRadius + radiusJitter;
    const a = angle + jitter;

    const sig = ev.significance || 3;
    const nodeRadius = 2 + sig * 1.5;
    const color = TYPE_COLORS[ev.celestialType] || '#C9A96E';

    return {
      ...ev,
      baseX: Math.cos(a) * r,
      baseY: Math.sin(a) * r,
      radius: nodeRadius,
      color,
      era,
      ringRadius: r,
      angle: a,
      glow: 0
    };
  });
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

// ── DRAW ──
function getTransformedPos(node) {
  const cos = Math.cos(rotationAngle);
  const sin = Math.sin(rotationAngle);
  const rx = node.baseX * cos - node.baseY * sin;
  const ry = node.baseX * sin + node.baseY * cos;
  return {
    x: cx + (rx + panX) * zoom,
    y: cy + (ry + panY) * zoom
  };
}

function drawMap(time) {
  ctx.clearRect(0, 0, W, H);

  const baseRadius = Math.min(W, H) * 0.43;
  const ringGap = baseRadius / 6;

  // Draw concentric rings
  for (const era of ERAS) {
    const r = ringGap * (era.ring + 0.5) * zoom;
    // Ring outline
    ctx.beginPath();
    ctx.arc(cx + panX * zoom, cy + panY * zoom, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(232,228,220,0.06)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 8]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Ring fill band
    ctx.beginPath();
    ctx.arc(cx + panX * zoom, cy + panY * zoom, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(232,228,220,${0.012 + era.ring * 0.003})`;
    ctx.lineWidth = ringGap * zoom * 0.7;
    ctx.stroke();

    // Era label — placed along the 2 o'clock direction so they don't stack
    const labelAngle = -Math.PI / 5;
    const labelR = r + 4;
    const lx = cx + panX * zoom + Math.cos(labelAngle) * labelR;
    const ly = cy + panY * zoom + Math.sin(labelAngle) * labelR;
    ctx.save();
    ctx.font = `${Math.max(7, 9 * zoom)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = 'rgba(232,228,220,0.18)';
    ctx.textAlign = 'left';
    ctx.translate(lx, ly);
    ctx.rotate(labelAngle);
    ctx.fillText(era.name.toUpperCase(), 6, 0);
    ctx.restore();
  }

  // Draw radial guide lines (like a compass rose)
  const maxR = ringGap * 5.8 * zoom;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const x1 = cx + panX * zoom + Math.cos(a) * ringGap * 0.8 * zoom;
    const y1 = cy + panY * zoom + Math.sin(a) * ringGap * 0.8 * zoom;
    const x2 = cx + panX * zoom + Math.cos(a) * maxR;
    const y2 = cy + panY * zoom + Math.sin(a) * maxR;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(232,228,220,${i % 3 === 0 ? 0.04 : 0.015})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw center glow
  const coreX = cx + panX * zoom;
  const coreY = cy + panY * zoom;
  const pulse = 0.7 + 0.3 * Math.sin(time * 0.002);
  const coreR = 18 * zoom * pulse;

  const coreGrad = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, coreR * 4);
  coreGrad.addColorStop(0, `rgba(201,169,110,${0.3 * pulse})`);
  coreGrad.addColorStop(0.3, `rgba(201,169,110,${0.1 * pulse})`);
  coreGrad.addColorStop(1, 'rgba(201,169,110,0)');
  ctx.beginPath();
  ctx.arc(coreX, coreY, coreR * 4, 0, Math.PI * 2);
  ctx.fillStyle = coreGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(coreX, coreY, coreR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(201,169,110,${0.6 * pulse})`;
  ctx.fill();

  ctx.font = `${Math.max(10, 14 * zoom)}px 'Source Serif 4', serif`;
  ctx.fillStyle = `rgba(232,228,220,${0.5 * pulse})`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☉', coreX, coreY + 1);

  // Draw constellation lines (connect events of same type)
  const typeGroups = {};
  for (const node of eventNodes) {
    if (activeFilters.size > 0 && !activeFilters.has(node.celestialType)) continue;
    if (!typeGroups[node.celestialType]) typeGroups[node.celestialType] = [];
    typeGroups[node.celestialType].push(node);
  }

  for (const type in typeGroups) {
    const group = typeGroups[type].sort((a, b) => a.year - b.year);
    if (group.length < 2) continue;
    const color = TYPE_COLORS[type] || '#C9A96E';

    // Draw curved constellation lines between same-type events
    for (let i = 0; i < group.length - 1; i++) {
      const p1 = getTransformedPos(group[i]);
      const p2 = getTransformedPos(group[i + 1]);
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;
      // Curve control point pulled toward center
      const cpX = midX * 0.85 + coreX * 0.15;
      const cpY = midY * 0.85 + coreY * 0.15;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(cpX, cpY, p2.x, p2.y);
      const alpha = (activeFilters.size === 0 || activeFilters.has(type)) ? 0.045 : 0.008;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Draw event nodes
  for (const node of eventNodes) {
    const pos = getTransformedPos(node);
    const isActive = activeFilters.size === 0 || activeFilters.has(node.celestialType);
    const isHovered = hoveredEvent === node;
    const isSelected = selectedEvent === node;

    const alpha = isActive ? 1 : 0.12;
    const r = node.radius * zoom * (isHovered ? 1.6 : 1);

    // Twinkle
    const twinkle = 0.7 + 0.3 * Math.sin(time * 0.003 + hashCode(node.id));

    // Glow
    if (isActive) {
      const glowR = r * (isHovered ? 6 : 3.5) * twinkle;
      const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
      const glowAlpha = isHovered ? 0.35 : 0.12;
      glow.addColorStop(0, hexToRgba(node.color, glowAlpha * twinkle));
      glow.addColorStop(1, hexToRgba(node.color, 0));
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node body
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(node.color, (isActive ? 0.85 : 0.15) * twinkle);
    ctx.fill();

    // Bright center
    if (isActive) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.45, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(node.color, 0.95 * twinkle);
      ctx.fill();
    }

    // Selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = node.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Store screen position for hit testing
    node._sx = pos.x;
    node._sy = pos.y;
    node._sr = r;
  }
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── INTERACTION ──
function hitTest(mx, my) {
  let closest = null;
  let closestDist = Infinity;
  for (const node of eventNodes) {
    if (currentView === 'world' && !LOCATIONS[node.id]) continue;
    const dx = mx - node._sx;
    const dy = my - node._sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitRadius = Math.max(node._sr + 6, 12);
    if (dist < hitRadius && dist < closestDist) {
      closest = node;
      closestDist = dist;
    }
  }
  return closest;
}

canvas.addEventListener('mousemove', e => {
  if (isDragging) return;
  const hit = hitTest(e.clientX, e.clientY);
  hoveredEvent = hit;
  canvas.style.cursor = hit ? 'pointer' : 'grab';

  const tip = document.getElementById('tooltip');
  if (hit) {
    document.getElementById('tipYear').textContent = hit.year + (hit.year < 0 ? ' BC' : ' AD');
    document.getElementById('tipYear').style.color = hit.color;
    document.getElementById('tipCelestial').textContent = hit.symbol + ' ' + hit.celestialEvent;
    document.getElementById('tipCelestial').style.color = hexToRgba(hit.color, 0.7);
    document.getElementById('tipWorld').textContent = hit.worldEvent;
    tip.classList.add('visible');

    let tx = e.clientX + 16;
    let ty = e.clientY - 10;
    if (tx + 320 > W) tx = e.clientX - 336;
    if (ty + 100 > H) ty = H - 110;
    if (ty < 10) ty = 10;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';
  } else {
    tip.classList.remove('visible');
  }
});

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX) / zoom;
  panY = panStartY + (e.clientY - dragStartY) / zoom;
});

window.addEventListener('mouseup', e => {
  if (isDragging) {
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (Math.abs(dx) < 4 && Math.abs(dy) < 4) {
      // It was a click
      const hit = hitTest(e.clientX, e.clientY);
      if (hit) {
        selectEvent(hit);
      } else {
        closePanel();
      }
    }
  }
  isDragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  const newZoom = Math.max(0.3, Math.min(5, zoom * (1 + delta)));
  zoom = newZoom;
  document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
}, { passive: false });

document.getElementById('zoomIn').addEventListener('click', () => {
  zoom = Math.min(5, zoom * 1.3);
  document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
});
document.getElementById('zoomOut').addEventListener('click', () => {
  zoom = Math.max(0.3, zoom / 1.3);
  document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
});

// ── DETAIL PANEL ──
function selectEvent(ev) {
  selectedEvent = ev;
  const panel = document.getElementById('detailPanel');
  const inner = document.getElementById('detailInner');
  const color = TYPE_COLORS[ev.celestialType] || '#C9A96E';

  let rippleHtml = '';
  if (ev.rippleEffects && ev.rippleEffects.length) {
    rippleHtml = `
      <div class="detail-section detail-section-ripple">
        <div class="detail-section-label">Ripple Effects</div>
        <div class="detail-ripple-timeline">
          ${ev.rippleEffects.map(r => `<div class="detail-ripple">${r}</div>`).join('')}
        </div>
      </div>`;
  }

  const loc = LOCATIONS[ev.id];
  const placeHtml = loc ? `<div class="detail-row" style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;">&#9678; ${loc.place}</div>` : '';

  const yearLabel = ev.year < 0 ? Math.abs(ev.year) + ' BC' : ev.year;
  const imageHtml = ev.image ? `
    <div class="detail-image-wrap">
      <img src="${ev.image}" alt="${ev.worldEvent}" onerror="this.parentElement.style.display='none'">
      <div class="detail-image-year" style="color:${color}">${yearLabel}</div>
    </div>` : '';

  inner.innerHTML = `
    ${imageHtml}
    <div class="detail-accent" style="background:${color}"></div>
    ${!ev.image ? `<div class="detail-year" style="color:${color}">${yearLabel}</div>` : ''}
    <div class="detail-date">${ev.date || ''}</div>
    <div class="detail-badge" style="background:${hexToRgba(color, 0.15)};color:${color};border:1px solid ${hexToRgba(color, 0.3)}">${ev.symbol || ''} ${(ev.celestialType || '').toUpperCase()}</div>
    <div class="detail-celestial">${ev.celestialEvent}</div>
    <div class="detail-world">${ev.worldEvent}</div>
    <div class="detail-category">${ev.category || ''}</div>
    ${placeHtml}
    ${ev.description ? `<div class="detail-section"><div class="detail-section-label">Description</div><div class="detail-section-text">${ev.description}</div></div>` : ''}
    ${ev.cosmicLink ? `<div class="detail-section detail-section-cosmic"><div class="detail-section-label">Cosmic Link</div><div class="detail-section-text">${ev.cosmicLink}</div></div>` : ''}
    ${ev.historicalParallel ? `<div class="detail-section detail-section-parallel"><div class="detail-section-label">Historical Parallel</div><div class="detail-section-text">${ev.historicalParallel}</div></div>` : ''}
    ${rippleHtml}
  `;

  panel.classList.add('open');
}

function closePanel() {
  selectedEvent = null;
  document.getElementById('detailPanel').classList.remove('open');
}

document.getElementById('detailClose').addEventListener('click', closePanel);

// ── FILTERS ──
function buildFilters() {
  const container = document.getElementById('filters');
  const types = ['eclipse', 'conjunction', 'opposition', 'square', 'retrograde', 'equinox', 'ingress'];

  // All button
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.textContent = 'All';
  allChip.addEventListener('click', () => {
    activeFilters.clear();
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    allChip.classList.add('active');
  });
  container.appendChild(allChip);

  types.forEach(type => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.textContent = TYPE_LABELS[type];
    chip.style.setProperty('--chip-color', TYPE_COLORS[type]);
    chip.addEventListener('click', () => {
      if (activeFilters.has(type)) {
        activeFilters.delete(type);
        chip.classList.remove('active');
      } else {
        activeFilters.add(type);
        chip.classList.add('active');
      }
      // Update "All" chip
      allChip.classList.toggle('active', activeFilters.size === 0);
      // Style active chips with their color
      document.querySelectorAll('.filter-chip').forEach(c => {
        if (c !== allChip && c.classList.contains('active')) {
          const t = types[Array.from(container.children).indexOf(c) - 1];
          if (t) {
            c.style.borderColor = TYPE_COLORS[t];
            c.style.color = TYPE_COLORS[t];
            c.style.background = hexToRgba(TYPE_COLORS[t], 0.1);
          }
        } else if (c !== allChip) {
          c.style.borderColor = '';
          c.style.color = '';
          c.style.background = '';
        }
      });
    });
    container.appendChild(chip);
  });
}

function buildLegend() {
  const container = document.getElementById('legend');
  const types = [
    ['Eclipse', '#E84545'],
    ['Conjunction', '#C9A96E'],
    ['Opposition', '#E07A2F'],
    ['Square', '#8B7EC7'],
    ['Retrograde', '#4A90D9'],
    ['Equinox', '#7ECBA1'],
    ['Ingress', '#6B9E9E']
  ];
  // Deduplicate by color
  const seen = new Set();
  types.forEach(([label, color]) => {
    const key = color;
    if (seen.has(key)) return;
    seen.add(key);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${color};box-shadow:0 0 6px ${hexToRgba(color,0.5)}"></span>${label}`;
    container.appendChild(item);
  });
}

// ── WORLD MAP PROJECTION ──
const MAP_BOUNDS = { minLon: -180, maxLon: 180, minLat: -65, maxLat: 80 };

function geoToScreen(lat, lon) {
  const nx = (lon - MAP_BOUNDS.minLon) / (MAP_BOUNDS.maxLon - MAP_BOUNDS.minLon);
  const ny = 1 - (lat - MAP_BOUNDS.minLat) / (MAP_BOUNDS.maxLat - MAP_BOUNDS.minLat);
  const pad = 40;
  const mapW = W - pad * 2;
  const mapH = H - pad * 2;
  const aspect = 2.2;
  let drawW, drawH;
  if (mapW / mapH > aspect) { drawH = mapH; drawW = drawH * aspect; }
  else { drawW = mapW; drawH = drawW / aspect; }
  const offsetX = (W - drawW) / 2;
  const offsetY = (H - drawH) / 2;
  const baseX = offsetX + nx * drawW;
  const baseY = offsetY + ny * drawH;
  const mcx = W / 2, mcy = H / 2;
  return {
    x: mcx + (baseX - mcx + panX) * zoom,
    y: mcy + (baseY - mcy + panY) * zoom
  };
}

function drawWorldMap(time) {
  ctx.clearRect(0, 0, W, H);

  // Graticule grid
  ctx.strokeStyle = 'rgba(232,228,220,0.06)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 8]);
  for (let lon = -180; lon <= 180; lon += 30) {
    ctx.beginPath();
    for (let lat = -65; lat <= 80; lat += 5) {
      const p = geoToScreen(lat, lon);
      if (lat === -65) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  for (let lat = -60; lat <= 80; lat += 30) {
    ctx.beginPath();
    for (let lon = -180; lon <= 180; lon += 5) {
      const p = geoToScreen(lat, lon);
      if (lon === -180) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Coastlines
  ctx.strokeStyle = 'rgba(232,228,220,0.22)';
  ctx.lineWidth = 1.2 * Math.min(zoom, 2);
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  for (const polyline of COASTLINES) {
    ctx.beginPath();
    for (let i = 0; i < polyline.length; i++) {
      const [lon, lat] = polyline[i];
      const p = geoToScreen(lat, lon);
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }

  // Event nodes
  const sortedNodes = [...eventNodes].sort((a, b) => {
    const aActive = activeFilters.size === 0 || activeFilters.has(a.celestialType);
    const bActive = activeFilters.size === 0 || activeFilters.has(b.celestialType);
    if (aActive !== bActive) return aActive ? 1 : -1;
    return a.significance - b.significance;
  });

  for (const node of sortedNodes) {
    const loc = LOCATIONS[node.id];
    if (!loc) continue;

    const pos = geoToScreen(loc.lat, loc.lon);
    const isActive = activeFilters.size === 0 || activeFilters.has(node.celestialType);
    const isHovered = hoveredEvent === node;
    const isSelected = selectedEvent === node;
    const color = TYPE_COLORS[node.celestialType] || '#C9A96E';

    const r = (2 + node.significance * 1.5) * zoom * (isHovered ? 1.5 : 1);
    const hash = node.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const twinkle = 0.7 + 0.3 * Math.sin(time * 0.003 + hash);

    // Glow
    if (isActive) {
      const glowR = r * (isHovered ? 6 : 3) * twinkle;
      const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
      glow.addColorStop(0, hexToRgba(color, (isHovered ? 0.4 : 0.15) * twinkle));
      glow.addColorStop(1, hexToRgba(color, 0));
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node dot
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(color, (isActive ? 0.85 : 0.12) * twinkle);
    ctx.fill();

    // Bright center
    if (isActive) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(color, 0.95 * twinkle);
      ctx.fill();
    }

    // Selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Hover label
    if (isHovered && isActive) {
      ctx.font = `500 ${Math.max(10, 11 * zoom)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = 'rgba(232,228,220,0.9)';
      ctx.textAlign = 'left';
      ctx.fillText(node.worldEvent, pos.x + r + 8, pos.y - 4);
      ctx.font = `400 ${Math.max(8, 9 * zoom)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = hexToRgba(color, 0.7);
      ctx.fillText(loc.place + ' \u00b7 ' + (node.year < 0 ? Math.abs(node.year) + ' BC' : node.year), pos.x + r + 8, pos.y + 10);
    }

    // Store screen position for hit testing
    node._sx = pos.x;
    node._sy = pos.y;
    node._sr = r;
  }
}

// ── ANIMATION LOOP ──
let animFrame;
function loop(time) {
  rotationAngle += 0.0001; // Very slow rotation
  drawStarfield(time);
  if (currentView === 'radial') {
    drawMap(time);
  } else {
    drawWorldMap(time);
  }
  animFrame = requestAnimationFrame(loop);
}

// ── INIT ──
window.addEventListener('resize', resize);
resize();
buildFilters();
buildLegend();
computeNodes();
loop(0);

// ── VIEW TOGGLE ──
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  panX = 0; panY = 0; zoom = 1;
  document.getElementById('zoomLevel').textContent = '1.0x';
  // Hide legend in world view
  const legend = document.querySelector('.legend');
  if (legend) legend.style.display = view === 'radial' ? '' : 'none';
}
document.getElementById('btnAbove').addEventListener('click', () => switchView('radial'));
document.getElementById('btnBelow').addEventListener('click', () => switchView('world'));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// Touch support
let touchStartDist = 0;
let touchStartZoom = 1;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx + dy*dy);
    touchStartZoom = zoom;
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    panX = panStartX + (e.touches[0].clientX - dragStartX) / zoom;
    panY = panStartY + (e.touches[0].clientY - dragStartY) / zoom;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    zoom = Math.max(0.3, Math.min(5, touchStartZoom * (dist / touchStartDist)));
    document.getElementById('zoomLevel').textContent = zoom.toFixed(1) + 'x';
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    isDragging = false;
  }
});
</script>
