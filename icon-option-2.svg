<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1412"/>
      <stop offset="100%" stop-color="#0d0a08"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#a07850"/>
    </linearGradient>
    <radialGradient id="eclipse" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d0a08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg2)"/>

  <!-- Subtle ambient glow -->
  <circle cx="220" cy="230" r="200" fill="url(#eclipse)"/>

  <!-- Total solar eclipse - the main icon -->
  <!-- Sun corona (outer glow ring) -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="#c4956a" stroke-width="0.75" stroke-opacity="0.2"/>
  <circle cx="256" cy="240" r="115" fill="none" stroke="#c4956a" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="256" cy="240" r="100" fill="none" stroke="url(#gold2)" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Sun body (hidden behind moon) -->
  <circle cx="256" cy="240" r="85" fill="#0d0a08" stroke="url(#gold2)" stroke-width="3"/>

  <!-- Corona wisps -->
  <g opacity="0.35" stroke="url(#gold2)" stroke-linecap="round" fill="none">
    <path d="M 256 148 Q 260 130 256 118" stroke-width="2"/>
    <path d="M 300 160 Q 315 145 320 128" stroke-width="1.5"/>
    <path d="M 212 160 Q 197 145 192 128" stroke-width="1.5"/>
    <path d="M 340 200 Q 358 190 370 178" stroke-width="1.5"/>
    <path d="M 172 200 Q 154 190 142 178" stroke-width="1.5"/>
    <path d="M 348 240 Q 365 240 378 238" stroke-width="1.5"/>
    <path d="M 164 240 Q 147 240 134 238" stroke-width="1.5"/>
    <path d="M 340 280 Q 355 290 368 300" stroke-width="1"/>
    <path d="M 172 280 Q 157 290 144 300" stroke-width="1"/>
    <path d="M 300 320 Q 310 335 316 348" stroke-width="1"/>
    <path d="M 212 320 Q 202 335 196 348" stroke-width="1"/>
    <path d="M 256 332 Q 256 348 258 360" stroke-width="1.5"/>
  </g>

  <!-- Small diamond/star accent at top -->
  <g transform="translate(256, 100)" fill="url(#gold2)" opacity="0.6">
    <polygon points="0,-8 2.5,0 0,8 -2.5,0"/>
  </g>

  <!-- Text below eclipse -->
  <text x="256" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="url(#gold2)" text-anchor="middle" letter-spacing="12" opacity="0.9">COSMOS</text>
  <text x="256" y="455" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c4956a" text-anchor="middle" letter-spacing="8" opacity="0.5">DAILY</text>
</svg>