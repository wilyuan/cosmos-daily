<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D0B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0D0B1A"/>
  <rect width="512" height="512" rx="96" fill="url(#glow5)"/>
  <rect width="510" height="510" x="1" y="1" rx="95" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Orbits -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.16"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.22"/>
  <!-- Tilted orbit -->
  <ellipse cx="256" cy="256" rx="145" ry="50" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.12" transform="rotate(-25, 256, 256)"/>
  <!-- Central crescent (bolder, more visible) -->
  <circle cx="256" cy="256" r="42" fill="#C9A96E" opacity="0.95"/>
  <circle cx="242" cy="246" r="36" fill="#0D0B1A"/>
  <!-- Event dots — color coded, brighter for social -->
  <circle cx="256" cy="86" r="7" fill="#E84545" opacity="0.9"/>
  <circle cx="356" cy="156" r="5.5" fill="#C9A96E" opacity="0.85"/>
  <circle cx="400" cy="280" r="6" fill="#E07A2F" opacity="0.85"/>
  <circle cx="326" cy="400" r="5" fill="#8B7EC7" opacity="0.8"/>
  <circle cx="186" cy="400" r="5.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="112" cy="280" r="4.5" fill="#6B9E9E" opacity="0.8"/>
  <circle cx="156" cy="156" r="5" fill="#E84545" opacity="0.75"/>
  <!-- Inner orbit dots -->
  <circle cx="326" cy="232" r="4" fill="#C9A96E" opacity="0.7"/>
  <circle cx="196" cy="310" r="3.5" fill="#E07A2F" opacity="0.65"/>
  <!-- Constellation lines -->
  <g stroke="#C9A96E" stroke-width="0.6" stroke-opacity="0.1">
    <line x1="256" y1="86" x2="356" y2="156"/>
    <line x1="356" y1="156" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="326" y2="400"/>
    <line x1="186" y1="400" x2="112" y2="280"/>
    <line x1="112" y1="280" x2="156" y2="156"/>
    <line x1="156" y1="156" x2="256" y2="86"/>
  </g>
</svg>
