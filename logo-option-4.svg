<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0D0B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background: slightly lighter for social visibility -->
  <rect width="512" height="512" rx="96" fill="#0D0B1A"/>
  <rect width="512" height="512" rx="96" fill="url(#glow4)"/>
  <!-- Subtle border -->
  <rect width="510" height="510" x="1" y="1" rx="95" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Conjunction: two overlapping crescents -->
  <!-- Left crescent -->
  <circle cx="218" cy="256" r="80" fill="none" stroke="url(#gold4)" stroke-width="3"/>
  <circle cx="205" cy="248" r="68" fill="#0D0B1A"/>
  <!-- Right crescent -->
  <circle cx="294" cy="256" r="80" fill="none" stroke="url(#gold4)" stroke-width="3"/>
  <circle cx="307" cy="248" r="68" fill="#0D0B1A"/>
  <!-- Conjunction point glow -->
  <circle cx="256" cy="272" r="18" fill="#C9A96E" opacity="0.1"/>
  <circle cx="256" cy="272" r="8" fill="#C9A96E" opacity="0.3"/>
  <circle cx="256" cy="272" r="3" fill="#C9A96E" opacity="0.9"/>
  <!-- Three tiny stars scattered -->
  <circle cx="120" cy="140" r="2.5" fill="#C9A96E" opacity="0.4"/>
  <circle cx="400" cy="130" r="2" fill="#C9A96E" opacity="0.35"/>
  <circle cx="380" cy="400" r="2" fill="#C9A96E" opacity="0.3"/>
  <circle cx="140" cy="390" r="1.5" fill="#C9A96E" opacity="0.25"/>
</svg>
