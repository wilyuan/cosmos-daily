<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>X Banner v4</title></head>
<body style="margin:0;background:#000;">
<canvas id="c" width="1500" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1500, H = 500;

// Background — match actual map bg
ctx.fillStyle = '#07060D';
ctx.fillRect(0, 0, W, H);

// Ambient orbs (same as actual map)
const orb1 = ctx.createRadialGradient(750, 250, 0, 750, 250, 500);
orb1.addColorStop(0, 'rgba(201,169,110,0.035)');
orb1.addColorStop(1, 'transparent');
ctx.fillStyle = orb1;
ctx.fillRect(0, 0, W, H);

const orb2 = ctx.createRadialGradient(300, 400, 0, 300, 400, 350);
orb2.addColorStop(0, 'rgba(139,126,199,0.025)');
orb2.addColorStop(1, 'transparent');
ctx.fillStyle = orb2;
ctx.fillRect(0, 0, W, H);

const orb3 = ctx.createRadialGradient(1200, 100, 0, 1200, 100, 350);
orb3.addColorStop(0, 'rgba(232,69,69,0.025)');
orb3.addColorStop(1, 'transparent');
ctx.fillStyle = orb3;
ctx.fillRect(0, 0, W, H);

// Stars (match actual map density)
for (let i = 0; i < 350; i++) {
  const alpha = Math.random() * 0.35 + 0.05;
  const r = Math.random() * 1.1 + 0.2;
  ctx.beginPath();
  ctx.arc(Math.random() * W, Math.random() * H, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(232,230,240,' + alpha + ')';
  ctx.fill();
}

// === LARGE CELESTIAL MAP ===
const cx = 750, cy = 260;
const rings = [65, 120, 180, 250, 330];

// Concentric rings (match actual map style)
rings.forEach((r, i) => {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(232,228,220,' + (0.04 + i * 0.012) + ')';
  ctx.lineWidth = 0.6;
  ctx.setLineDash([2, 5]);
  ctx.stroke();
  ctx.setLineDash([]);
});

// Radial guide lines (12 spokes)
for (let a = 0; a < 12; a++) {
  const angle = (a / 12) * Math.PI * 2;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(angle) * 40, cy + Math.sin(angle) * 40);
  ctx.lineTo(cx + Math.cos(angle) * 345, cy + Math.sin(angle) * 345);
  ctx.strokeStyle = a % 3 === 0 ? 'rgba(232,228,220,0.035)' : 'rgba(232,228,220,0.015)';
  ctx.lineWidth = 0.4;
  ctx.stroke();
}

// Era band fills (very subtle)
rings.forEach((r, i) => {
  if (i === 0) return;
  const prevR = rings[i - 1];
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.arc(cx, cy, prevR, 0, Math.PI * 2, true);
  ctx.fillStyle = 'rgba(232,228,220,' + (0.008 + (i % 2) * 0.005) + ')';
  ctx.fill();
});

// Center sun glow (pulsing effect baked in)
const sunGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
sunGlow.addColorStop(0, 'rgba(201,169,110,0.18)');
sunGlow.addColorStop(0.5, 'rgba(201,169,110,0.05)');
sunGlow.addColorStop(1, 'rgba(201,169,110,0)');
ctx.beginPath();
ctx.arc(cx, cy, 50, 0, Math.PI * 2);
ctx.fillStyle = sunGlow;
ctx.fill();

// Center symbol
ctx.font = '16px serif';
ctx.fillStyle = 'rgba(201,169,110,0.5)';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('\u2609', cx, cy);
ctx.textAlign = 'left';
ctx.textBaseline = 'alphabetic';

// === EVENT DOTS (150+, matching actual distribution) ===
const TYPE_COLORS = {
  eclipse: '#E84545',
  conjunction: '#C9A96E',
  opposition: '#E07A2F',
  square: '#8B7EC7',
  retrograde: '#4A90D9',
  ingress: '#6B9E9E'
};
const typeKeys = Object.keys(TYPE_COLORS);
const typeWeights = [0.25, 0.3, 0.12, 0.1, 0.1, 0.13]; // rough distribution

function pickType() {
  let r = Math.random(), cumul = 0;
  for (let i = 0; i < typeKeys.length; i++) {
    cumul += typeWeights[i];
    if (r < cumul) return typeKeys[i];
  }
  return typeKeys[0];
}

const events = [];
for (let i = 0; i < 170; i++) {
  const ring = Math.floor(Math.random() * 5);
  const angle = Math.random() * Math.PI * 2;
  const baseR = rings[ring];
  const spread = ring === 0 ? 12 : 18;
  const r = baseR + (Math.random() - 0.5) * spread;
  const type = pickType();
  const color = TYPE_COLORS[type];
  const sig = 1 + Math.random() * 4;
  const size = 1.5 + sig * 0.8;
  const x = cx + Math.cos(angle) * r;
  const y = cy + Math.sin(angle) * r;
  events.push({ x, y, color, size, type, sig });
}

// Constellation lines (connecting same-type events)
const byType = {};
events.forEach(e => {
  if (!byType[e.type]) byType[e.type] = [];
  byType[e.type].push(e);
});
Object.entries(byType).forEach(([type, evts]) => {
  evts.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));
  for (let i = 0; i < evts.length - 1; i++) {
    if (Math.random() > 0.3) continue;
    const e1 = evts[i], e2 = evts[i + 1];
    const dist = Math.hypot(e2.x - e1.x, e2.y - e1.y);
    if (dist > 200) continue;
    // Curved line toward center
    const midX = (e1.x + e2.x) / 2;
    const midY = (e1.y + e2.y) / 2;
    const cpX = midX + (cx - midX) * 0.3;
    const cpY = midY + (cy - midY) * 0.3;
    ctx.beginPath();
    ctx.moveTo(e1.x, e1.y);
    ctx.quadraticCurveTo(cpX, cpY, e2.x, e2.y);
    ctx.strokeStyle = TYPE_COLORS[type] + '08';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
});

// Draw event nodes (sorted by size, smallest first)
events.sort((a, b) => a.size - b.size);
events.forEach(e => {
  const twinkle = 0.7 + 0.3 * Math.sin(e.x * 0.1 + e.y * 0.1);

  // Glow halo
  const glowR = e.size * 3.5 * twinkle;
  const glow = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
  glow.addColorStop(0, e.color + '1A');
  glow.addColorStop(1, e.color + '00');
  ctx.beginPath();
  ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Main dot
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
  ctx.fillStyle = e.color + 'DD';
  ctx.fill();

  // Bright center
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.size * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = e.color + 'FF';
  ctx.fill();
});

// === BOTTOM RIGHT: Compact color legend ===
const legendTypes = [
  { label: 'ECLIPSE', color: '#E84545' },
  { label: 'CONJUNCTION', color: '#C9A96E' },
  { label: 'OPPOSITION', color: '#E07A2F' },
  { label: 'SQUARE', color: '#8B7EC7' },
  { label: 'RETROGRADE', color: '#4A90D9' },
  { label: 'INGRESS', color: '#6B9E9E' },
];

const lx = 1135;
const ly = 420;

legendTypes.forEach((t, i) => {
  const x = lx + (i % 3) * 125;
  const y = ly + Math.floor(i / 3) * 20;
  // Dot
  ctx.beginPath();
  ctx.arc(x, y + 3, 3, 0, Math.PI * 2);
  ctx.fillStyle = t.color;
  ctx.fill();
  // Label
  ctx.font = '400 8.5px "Courier New", monospace';
  ctx.fillStyle = t.color + 'BB';
  ctx.textAlign = 'left';
  ctx.fillText(t.label, x + 9, y + 6);
});

// Soft vignette (just edges, don't darken center)
const vigL = ctx.createLinearGradient(0, 0, 80, 0);
vigL.addColorStop(0, 'rgba(7,6,13,0.4)');
vigL.addColorStop(1, 'rgba(7,6,13,0)');
ctx.fillStyle = vigL;
ctx.fillRect(0, 0, 80, H);

const vigR = ctx.createLinearGradient(W - 80, 0, W, 0);
vigR.addColorStop(0, 'rgba(7,6,13,0)');
vigR.addColorStop(1, 'rgba(7,6,13,0.4)');
ctx.fillStyle = vigR;
ctx.fillRect(W - 80, 0, 80, H);

// Download
setTimeout(() => {
  canvas.toBlob(function(blob) {
    const a = document.createElement('a');
    a.download = 'cosmos-daily-banner-v4.png';
    a.href = URL.createObjectURL(blob);
    a.click();
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    document.body.style.background = '#16181C';
    document.body.style.padding = '40px';
  }, 'image/png');
}, 500);
</script>
</body>
</html>
