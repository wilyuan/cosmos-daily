<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1e1714"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </radialGradient>
    <linearGradient id="gold3" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#dbb68a"/>
      <stop offset="50%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#8a6540"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c45c4a"/>
      <stop offset="100%" stop-color="#8a3a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>

  <!-- Minimal eclipse symbol - just a circle with crescent -->
  <circle cx="256" cy="230" r="100" fill="none" stroke="url(#gold3)" stroke-width="2.5"/>

  <!-- Moon creating eclipse (overlapping circle to create crescent effect) -->
  <circle cx="280" cy="215" r="88" fill="url(#bg3)"/>

  <!-- Tiny red dot - like the "active" indicator on the site -->
  <circle cx="190" cy="170" r="5" fill="url(#redAccent)"/>

  <!-- Thin horizontal line through center - like a timeline -->
  <line x1="80" y1="350" x2="432" y2="350" stroke="url(#gold3)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Timeline dots -->
  <circle cx="120" cy="350" r="3" fill="#c4956a" opacity="0.3"/>
  <circle cx="200" cy="350" r="3" fill="#c4956a" opacity="0.4"/>
  <circle cx="256" cy="350" r="5" fill="url(#gold3)" opacity="0.8"/>
  <circle cx="330" cy="350" r="3" fill="#c4956a" opacity="0.4"/>
  <circle cx="400" cy="350" r="3" fill="#c4956a" opacity="0.3"/>

  <!-- Brand text -->
  <text x="256" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="url(#gold3)" text-anchor="middle" letter-spacing="10" opacity="0.85">COSMOS</text>
  <text x="256" y="462" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#c4956a" text-anchor="middle" letter-spacing="7" opacity="0.45">DAILY</text>
</svg>