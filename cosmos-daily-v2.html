<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Daily v2 — Interactive Celestial & World Events Database</title>

    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital@0;1&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Serif 4', serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d3a 50%, #0f1629 100%);
            color: #e8e6e1;
            overflow-x: hidden;
            position: relative;
        }

        /* Starfield background */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        .star-twinkle {
            animation: twinkle 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0); }
            25% { transform: translate(20px, -10px); }
            50% { transform: translate(0, 0); }
            75% { transform: translate(-15px, 10px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes headerGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(201, 169, 110, 0.3); }
            50% { text-shadow: 0 0 30px rgba(201, 169, 110, 0.8); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            animation: fadeSlideUp 1s ease-out;
        }

        .hero-question {
            font-size: 2.5rem;
            font-style: italic;
            color: #C9A96E;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
            animation: headerGlow 4s ease-in-out infinite;
        }

        .title {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #e8e6e1;
            animation: fadeSlideUp 1.2s ease-out;
        }

        .subtitle {
            font-size: 0.95rem;
            letter-spacing: 2px;
            color: #9a9690;
            margin-bottom: 40px;
            font-family: 'IBM Plex Mono', monospace;
            animation: fadeIn 1.5s ease-out;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: rgba(45, 50, 80, 0.4);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 8px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: fadeIn 1.8s ease-out;
        }

        .stat-item {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
        }

        .stat-number {
            font-size: 1.4rem;
            color: #C9A96E;
            font-weight: 600;
        }

        /* Today's Sky Panel */
        .todays-sky {
            background: rgba(45, 50, 80, 0.6);
            border: 2px solid #C9A96E;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            animation: fadeSlideUp 1.4s ease-out;
            position: relative;
            overflow: hidden;
        }

        .todays-sky::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.1), transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        .sky-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .sky-title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #C9A96E;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(126, 203, 161, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #7ECBA1;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #7ECBA1;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .sky-date {
            font-size: 1.1rem;
            color: #e8e6e1;
            margin-bottom: 15px;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
        }

        .planets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .planet-card {
            background: rgba(25, 30, 50, 0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #C9A96E;
        }

        .planet-name {
            font-weight: 600;
            color: #C9A96E;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .planet-position {
            font-size: 0.9rem;
            color: #b8b4ad;
            font-family: 'IBM Plex Mono', monospace;
        }

        .transits-section {
            background: rgba(25, 30, 50, 0.8);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 3px solid #E8A545;
            position: relative;
            z-index: 1;
        }

        .transit-title {
            font-weight: 600;
            color: #E8A545;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .transit-text {
            font-size: 0.9rem;
            color: #b8b4ad;
            line-height: 1.5;
        }

        .next-event {
            background: rgba(25, 30, 50, 0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #8B7EC7;
            position: relative;
            z-index: 1;
        }

        .event-label {
            font-weight: 600;
            color: #8B7EC7;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .event-detail {
            font-size: 0.9rem;
            color: #b8b4ad;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            align-items: center;
            animation: fadeIn 2s ease-out;
        }

        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #9a9690;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .view-toggle {
            display: flex;
            background: rgba(45, 50, 80, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .toggle-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #9a9690;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .toggle-btn.active {
            background: #C9A96E;
            color: #0a0e27;
        }

        .toggle-btn:hover {
            background: rgba(201, 169, 110, 0.2);
            color: #C9A96E;
        }

        .filter-pill {
            padding: 8px 16px;
            background: rgba(45, 50, 80, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 20px;
            color: #b8b4ad;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
            white-space: nowrap;
        }

        .filter-pill.active {
            background: #C9A96E;
            color: #0a0e27;
            border-color: #C9A96E;
        }

        .filter-pill:hover {
            border-color: #C9A96E;
            color: #C9A96E;
        }

        /* Timeline View */
        .timeline-container {
            position: relative;
            padding: 40px 0;
            animation: fadeIn 2.2s ease-out;
        }

        .timeline-spine {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, rgba(201, 169, 110, 0.5) 0%, rgba(201, 169, 110, 0) 100%);
        }

        .event-card {
            margin-bottom: 60px;
            animation: fadeSlideUp 0.8s ease-out;
            position: relative;
        }

        .event-card-content {
            background: rgba(45, 50, 80, 0.5);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .event-card-content:hover {
            background: rgba(45, 50, 80, 0.8);
            border-color: #C9A96E;
            box-shadow: 0 8px 32px rgba(201, 169, 110, 0.1);
        }

        .event-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
        }

        .event-year {
            font-size: 1.4rem;
            font-weight: 700;
            color: #C9A96E;
            min-width: 80px;
        }

        .event-headline {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e8e6e1;
            flex: 1;
            line-height: 1.3;
        }

        .event-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .type-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(45, 50, 80, 0.6);
            border-radius: 4px;
            font-size: 0.8rem;
            color: #b8b4ad;
            font-family: 'IBM Plex Mono', monospace;
        }

        .category-icon {
            font-size: 1rem;
        }

        .event-description {
            font-size: 0.95rem;
            color: #b8b4ad;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .celestial-event {
            font-size: 0.9rem;
            color: #7ECBA1;
            font-style: italic;
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 2px solid #7ECBA1;
        }

        .expand-btn {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(201, 169, 110, 0.2);
            border: 1px solid #C9A96E;
            border-radius: 4px;
            color: #C9A96E;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: #C9A96E;
            color: #0a0e27;
        }

        /* Expanded Event Details */
        .expanded-details {
            background: rgba(25, 30, 50, 0.8);
            border: 1px solid #C9A96E;
            border-radius: 8px;
            margin-top: 12px;
            padding: 20px;
            animation: fadeSlideUp 0.4s ease-out;
        }

        .details-tab-nav {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .details-tab {
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: #9a9690;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .details-tab.active {
            color: #C9A96E;
            border-bottom-color: #C9A96E;
        }

        .details-tab:hover {
            color: #C9A96E;
        }

        .details-content {
            font-size: 0.95rem;
            color: #b8b4ad;
            line-height: 1.7;
        }

        .details-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cosmic-link {
            background: rgba(201, 169, 110, 0.1);
            border-left: 3px solid #C9A96E;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-style: italic;
        }

        .key-figures {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .figure {
            background: rgba(45, 50, 80, 0.8);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            border-left: 2px solid #8B7EC7;
        }

        .deeper-reading {
            background: rgba(139, 126, 199, 0.1);
            padding: 12px;
            border-left: 3px solid #8B7EC7;
            border-radius: 4px;
        }

        .deeper-reading li {
            margin-bottom: 8px;
            color: #b8b4ad;
        }

        .related-events {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-link {
            padding: 6px 12px;
            background: rgba(201, 169, 110, 0.15);
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 4px;
            color: #C9A96E;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .related-link:hover {
            background: #C9A96E;
            color: #0a0e27;
            border-color: #C9A96E;
        }

        /* Calendar View */
        .calendar-container {
            overflow-x: auto;
            animation: fadeIn 2.2s ease-out;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(45, 50, 80, 0.5);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .calendar-table thead {
            background: rgba(25, 30, 50, 0.8);
            border-bottom: 2px solid #C9A96E;
        }

        .calendar-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #C9A96E;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .calendar-table th:hover {
            background: rgba(201, 169, 110, 0.1);
        }

        .calendar-table tbody tr {
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .calendar-table tbody tr:hover {
            background: rgba(201, 169, 110, 0.1);
        }

        .calendar-table td {
            padding: 12px;
            color: #b8b4ad;
            font-size: 0.9rem;
        }

        .calendar-year {
            font-weight: 600;
            color: #C9A96E;
        }

        .calendar-type-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        /* Glossary */
        .glossary {
            margin-top: 60px;
            padding: 40px;
            background: rgba(25, 30, 50, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 8px;
            animation: fadeIn 2.5s ease-out;
        }

        .glossary-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: #C9A96E;
        }

        .glossary-section {
            margin-bottom: 30px;
        }

        .glossary-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glossary-item {
            margin-bottom: 15px;
            padding-left: 12px;
            border-left: 2px solid rgba(201, 169, 110, 0.3);
        }

        .glossary-term {
            font-weight: 600;
            color: #e8e6e1;
            margin-bottom: 4px;
        }

        .glossary-def {
            font-size: 0.9rem;
            color: #b8b4ad;
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid rgba(201, 169, 110, 0.2);
            margin-top: 80px;
            animation: fadeIn 2.8s ease-out;
        }

        .footer-disclaimer {
            font-size: 0.9rem;
            color: #9a9690;
            margin-bottom: 20px;
            line-height: 1.7;
            font-style: italic;
        }

        .footer-credit {
            font-size: 0.85rem;
            color: #5a5550;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer-span {
            font-size: 0.8rem;
            color: #4a4540;
            margin-top: 15px;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-question {
                font-size: 1.8rem;
            }

            .title {
                font-size: 2.5rem;
            }

            .timeline-spine {
                display: none;
            }

            .planets-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }

            .calendar-table {
                font-size: 0.75rem;
            }

            .calendar-table th,
            .calendar-table td {
                padding: 8px;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .control-group {
                width: 100%;
            }

            .filter-pill {
                flex: 1;
                min-width: 100px;
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9a9690;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
    </style>
</head>

                                        {filteredEvents.map(event => (
                                            <tr key={event.id} onClick={() => setExpandedId(expandedId === event.id ? null : event.id)}>
                                                <td className="calendar-year">{event.yearDisplay}</td>
                                                <td>{event.headline}</td>
                                                <td>{event.celestialEvent}</td>
                                                <td>
                                                    <span className="calendar-type-dot" style={{ backgroundColor: TYPE_COLORS[event.celestialType] }}></span>
                                                    {event.celestialType}
                                                </td>
                                                <td>
                                                    <span className="category-icon">{CATEGORIES[event.category].icon}</span>
                                                    {event.category}
                                                </td>
                                                <td>{event.cycle}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {/* Glossary */}
                    <div className="container">
                        <div className="glossary">
                            <div className="glossary-title">Glossary</div>

                            <div className="glossary-section">
                                <div className="glossary-section-title">Celestial Event Types</div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Eclipse</div>
                                    <div className="glossary-def">The alignment of Sun, Moon, and Earth, where the Moon blocks the Sun (solar eclipse) or Earth's shadow falls on the Moon (lunar eclipse). Anciently considered the most powerful omens, marking the death of rulers or upheaval of kingdoms.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Conjunction</div>
                                    <div className="glossary-def">Two or more planets at the same degree of the zodiac, considered to merge their energies. Great conjunctions (Jupiter-Saturn, Jupiter-Neptune, Saturn-Neptune) occur every 20-39 years and mark shifts in social cycles.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Opposition</div>
                                    <div className="glossary-def">Two planets at opposite degrees (180° apart), creating tension and confrontation. Represents conflicts between opposing forces, often requiring integration or choice.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Square</div>
                                    <div className="glossary-def">Two planets at 90° angles, creating friction and dynamic tension. Associated with challenges, conflicts, and the need for action to resolve blocked energy.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Retrograde</div>
                                    <div className="glossary-def">When a planet appears to move backward from Earth's perspective (though it continues forward in orbit). A retrograde period suggests review, reconsideration, and reworking of that planet's themes.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Ingress</div>
                                    <div className="glossary-def">When a planet enters a new zodiac sign, marking a shift in its energy expression. Slow-moving planets (Saturn, Uranus, Neptune, Pluto) ingress every 2-30 years, creating long-term social shifts.</div>
                                </div>
                            </div>

                            <div className="glossary-section">
                                <div className="glossary-section-title">Planets & Their Themes</div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Sun</div>
                                    <div className="glossary-def">Identity, will, creative force, authority. A person or nation\'s core purpose and conscious will.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Moon</div>
                                    <div className="glossary-def">Emotion, instinct, collective mood, public opinion. The subconscious and masses.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Mercury</div>
                                    <div className="glossary-def">Communication, commerce, thought, information. Retrograde Mercury disrupts communication and travel.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Venus</div>
                                    <div className="glossary-def">Values, beauty, relationships, resources. What a person or nation cherishes and how they relate.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Mars</div>
                                    <div className="glossary-def">Action, aggression, desire, war. Raw force and willpower. Mars in hard aspect = conflict.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Jupiter</div>
                                    <div className="glossary-def">Expansion, luck, growth, excess. Jupiter conjunct = boom; Jupiter square/opposite = inflation and overreach.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Saturn</div>
                                    <div className="glossary-def">Structure, law, limitation, time. Saturn return (29.5 years) and Saturn square (7.25, 14.5, 21.75 years) mark major life/social transitions.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Uranus</div>
                                    <div className="glossary-def">Revolution, sudden change, technology, liberation. Uranus square (21 years), opposition (42 years), return (84 years) mark generational upheavals.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Neptune</div>
                                    <div className="glossary-def">Dissolution, illusion, spirituality, transcendence. Neptune return (165 years) is rare. Neptune square/opposite = dissolution of structures.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Pluto</div>
                                    <div className="glossary-def">Power, death/rebirth, transformation, shadow. Pluto return (248 years) = civilizational reckonings. Pluto aspects = unavoidable transformation.</div>
                                </div>
                            </div>

                            <div className="glossary-section">
                                <div className="glossary-section-title">Event Categories</div>

                                <div className="glossary-item">
                                    <div className="glossary-term">⚔️ Geopolitical</div>
                                    <div className="glossary-def">Wars, treaties, political upheaval, power shifts between nations and empires. Often correlated with Saturn-Pluto and Mars aspects.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">💰 Financial</div>
                                    <div className="glossary-def">Market crashes, bubbles, economic shifts. Often correlated with Jupiter-Saturn conjunctions and Saturn-Uranus oppositions.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">✝️ Religious</div>
                                    <div className="glossary-def">Religious events, prophecies, schisms, transformations in faith. Often correlates with Saturn-Neptune and Pluto transits.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">🔬 Scientific</div>
                                    <div className="glossary-def">Discoveries, technological breakthroughs, space exploration. Often correlates with Uranus and Uranus-Neptune transitions.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">🎭 Cultural</div>
                                    <div className="glossary-def">Social movements, cultural revolutions, shifts in collective values. Often correlates with Uranus-Pluto and Jupiter-Saturn cycles.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">💀 Deaths & Births</div>
                                    <div className="glossary-def">Significant figures born or died. Often a marker of individual genius at important historical moments (Jupiter-Uranus, Saturn-Neptune ingress).</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">🦠 Pandemic</div>
                                    <div className="glossary-def">Plagues, epidemics, health crises. Historically correlated with Saturn-Jupiter-Mars conjunctions in water signs and Saturn-Neptune aspects.</div>
                                </div>
                            </div>

                            <div className="glossary-section">
                                <div className="glossary-section-title">Key Concepts</div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Great Conjunction</div>
                                    <div className="glossary-def">Jupiter-Saturn conjunction, occurring every ~20 years. Marks major shifts in social orders, economic cycles, and political leadership. The conjunction moves through different zodiac elements every 200 years (mutation cycles).</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Saturn-Pluto Conjunction</div>
                                    <div className="glossary-def">Occurs every 33-36 years. Associated with destruction of old power structures, collapses of governments, and systemic resets. 1914 (WWI), 1947-48, 1982-84, 2020 (COVID).</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Pluto Return</div>
                                    <div className="glossary-def">When Pluto returns to its birth position (248-year cycle). Only occurs once per nation. The US Pluto return is 2022-2024. Represents confrontation with foundational shadows and existential transformation.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Uranus-Pluto Conjunction</div>
                                    <div className="glossary-def">Occurs every 127 years. Associated with revolutionary change, technological breakthroughs, and generational upheavals. 1966 (digital revolution begins), next in 2104.</div>
                                </div>

                                <div className="glossary-item">
                                    <div className="glossary-term">Conjunctionist Astrology</div>
                                    <div className="glossary-def">Medieval astrology that attributed world events to planetary conjunctions, particularly Saturn-Jupiter. The Black Death (1345) was officially blamed on a triple conjunction. This became astrology\'s most famous predictive claim.</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="container">
                        <div className="footer">
                            <div className="footer-disclaimer">
                                Astrology is a lens, not a law. We present celestial events alongside world events as a framework for reflection — not as causal claims or predictions. Correlation is not causation. This database maps observable celestial mechanics against historical events, inviting contemplation of pattern and timing.
                            </div>
                            <div className="footer-credit">
                                COSMOS DAILY · FOR EXPLORATION & PERSPECTIVE
                            </div>
                            <div className="footer-span">
                                Spanning 2,000+ years of celestial mechanics × human history
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Event Card Component
        function EventCard({ event, expanded, onToggle, expandedTab, onTabChange }) {
            const categoryInfo = CATEGORIES[event.category];

            return (
                <div className="event-card">
                    <div className="event-card-content" onClick={onToggle}>
                        <div className="event-header">
                            <div className="event-year">{event.yearDisplay}</div>
                            <div className="event-headline">{event.headline}</div>
                        </div>

                        <div className="event-meta">
                            <div className="badge">
                                <span className="type-badge" style={{ backgroundColor: TYPE_COLORS[event.celestialType] }}></span>
                                {event.celestialType}
                            </div>
                            <div className="badge">
                                <span className="category-icon">{categoryInfo.icon}</span>
                                {event.category}
                            </div>
                            <div className="badge">{event.cycle}</div>
                        </div>

                        <div className="event-description">
                            {event.whatHappened}
                        </div>

                        <div className="celestial-event">
                            ✦ {event.celestialEvent}
                        </div>

                        <button className="expand-btn">{expanded ? 'Close' : 'Expand'}</button>
                    </div>

                    {expanded && (
                        <ExpandedEventDetails
                            event={event}
                            activeTab={expandedTab}
                            onTabChange={onTabChange}
                        />
                    )}
                </div>
            );
        }

        // Expanded Event Details Component
        function ExpandedEventDetails({ event, activeTab, onTabChange }) {
            return (
                <div className="expanded-details">
                    <div className="details-tab-nav">
                        <button
                            className={`details-tab ${activeTab === 'what' ? 'active' : ''}`}
                            onClick={() => onTabChange('what')}
                        >
                            What Happened
                        </button>
                        <button
                            className={`details-tab ${activeTab === 'cosmic' ? 'active' : ''}`}
                            onClick={() => onTabChange('cosmic')}
                        >
                            Cosmic Link
                        </button>
                        <button
                            className={`details-tab ${activeTab === 'cycle' ? 'active' : ''}`}
                            onClick={() => onTabChange('cycle')}
                        >
                            Cycle Context
                        </button>
                        <button
                            className={`details-tab ${activeTab === 'deeper' ? 'active' : ''}`}
                            onClick={() => onTabChange('deeper')}
                        >
                            Deeper Reading
                        </button>
                    </div>

                    <div className="details-content">
                        {activeTab === 'what' && (
                            <div className="details-section">
                                <div className="section-title">What Happened</div>
                                <p>{event.whatHappened}</p>

                                {event.keyFigures && event.keyFigures.length > 0 && (
                                    <>
                                        <div className="section-title" style={{ marginTop: '20px' }}>Key Figures</div>
                                        <div className="key-figures">
                                            {event.keyFigures.map((figure, idx) => (
                                                <div key={idx} className="figure">{figure}</div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {activeTab === 'cosmic' && (
                            <div className="details-section">
                                <div className="cosmic-link">
                                    {event.cosmicLink}
                                </div>
                                <div style={{ marginTop: '15px', color: '#b8b4ad' }}>
                                    <strong>Celestial Event:</strong> {event.celestialEvent}<br />
                                    <strong>Position:</strong> {event.position}<br />
                                    <strong>Cycle:</strong> {event.cycle}
                                </div>
                            </div>
                        )}

                        {activeTab === 'cycle' && (
                            <div className="details-section">
                                <p>{event.cycleContext}</p>
                            </div>
                        )}

                        {activeTab === 'deeper' && (
                            <div className="details-section">
                                <div className="deeper-reading">
                                    <ul>
                                        {event.deeperReading && event.deeperReading.map((item, idx) => (
                                            <li key={idx}>{item}</li>
                                        ))}
                                    </ul>
                                </div>

                                {event.relatedEvents && event.relatedEvents.length > 0 && (
                                    <>
                                        <div className="section-title" style={{ marginTop: '20px' }}>Related Events</div>
                                        <div className="related-events">
                                            {event.relatedEvents.map(relId => {
                                                const relEvent = EVENTS.find(e => e.id === relId);
                                                return relEvent ? (
                                                    <div key={relId} className="related-link">
                                                        {relEvent.yearDisplay}: {relEvent.headline}
                                                    </div>
                                                ) : null;
                                            })}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Starfield Component
        function StarField() {
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                // Create stars
                const stars = [];
                for (let i = 0; i < 80; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 1.5,
                        opacity: Math.random() * 0.6 + 0.2,
                        twinkleSpeed: Math.random() * 0.05 + 0.01
                    });
                }

                let time = 0;
                const animate = () => {
                    ctx.fillStyle = 'rgba(10, 14, 39, 0)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    stars.forEach(star => {
                        const opacity = star.opacity + Math.sin(time * star.twinkleSpeed) * 0.3;
                        ctx.fillStyle = `rgba(232, 230, 225, ${Math.max(0.1, opacity)})`;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    time++;
                    requestAnimationFrame(animate);
                };

                animate();

                const handleResize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return <canvas ref={canvasRef} id="starfield"></canvas>;
        }

        // Render
        ReactDOM.render(<CosmosDaily />, document.getElementById('root'));
    </script>
