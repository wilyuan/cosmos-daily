<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="eclipseGlow6" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#C9A96E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0D0B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0D0B1A"/>
  <rect width="510" height="510" x="1" y="1" rx="95" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Eclipse halo glow -->
  <circle cx="256" cy="240" r="160" fill="url(#eclipseGlow6)"/>
  <!-- Full sun (hidden behind moon) -->
  <circle cx="256" cy="240" r="90" fill="none" stroke="url(#gold6)" stroke-width="3.5"/>
  <!-- Moon covering sun (offset for crescent effect) -->
  <circle cx="256" cy="240" r="82" fill="#0D0B1A"/>
  <!-- Visible corona on right side -->
  <circle cx="256" cy="240" r="90" fill="none" stroke="url(#gold6)" stroke-width="3.5"/>
  <circle cx="240" cy="232" r="80" fill="#0D0B1A"/>
  <!-- Corona burst rays (visible around the crescent) -->
  <g opacity="0.35" stroke="#C9A96E" stroke-linecap="round">
    <line x1="310" y1="168" x2="328" y2="148" stroke-width="2"/>
    <line x1="336" y1="200" x2="358" y2="188" stroke-width="1.8"/>
    <line x1="346" y1="240" x2="370" y2="240" stroke-width="2"/>
    <line x1="336" y1="280" x2="358" y2="292" stroke-width="1.8"/>
    <line x1="310" y1="312" x2="328" y2="332" stroke-width="2"/>
    <line x1="275" y1="328" x2="280" y2="350" stroke-width="1.5"/>
  </g>
  <!-- Timeline bar at bottom -->
  <line x1="100" y1="410" x2="412" y2="410" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Timeline event dots -->
  <circle cx="120" cy="410" r="4" fill="#E84545" opacity="0.8"/>
  <circle cx="175" cy="410" r="3.5" fill="#C9A96E" opacity="0.75"/>
  <circle cx="220" cy="410" r="3" fill="#8B7EC7" opacity="0.7"/>
  <circle cx="260" cy="410" r="4.5" fill="#E07A2F" opacity="0.85"/>
  <circle cx="310" cy="410" r="3" fill="#4A90D9" opacity="0.7"/>
  <circle cx="355" cy="410" r="4" fill="#E84545" opacity="0.8"/>
  <circle cx="395" cy="410" r="3.5" fill="#6B9E9E" opacity="0.75"/>
</svg>
