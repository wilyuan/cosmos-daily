<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12101A"/>
      <stop offset="100%" stop-color="#07060D"/>
    </radialGradient>
    <linearGradient id="gold2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#07060D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg2)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow2)"/>
  <!-- Conjunction symbol: two circles overlapping -->
  <!-- Left body (Saturn-like) -->
  <circle cx="220" cy="256" r="72" fill="none" stroke="url(#gold2)" stroke-width="2.5"/>
  <circle cx="220" cy="256" r="56" fill="#07060D"/>
  <circle cx="220" cy="256" r="56" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Right body (Neptune-like) -->
  <circle cx="292" cy="256" r="72" fill="none" stroke="url(#gold2)" stroke-width="2.5"/>
  <circle cx="292" cy="256" r="56" fill="#07060D"/>
  <circle cx="292" cy="256" r="56" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Conjunction glow at intersection -->
  <circle cx="256" cy="256" r="24" fill="#C9A96E" opacity="0.12"/>
  <circle cx="256" cy="256" r="12" fill="#C9A96E" opacity="0.25"/>
  <circle cx="256" cy="256" r="4" fill="#C9A96E" opacity="0.7"/>
  <!-- Subtle orbital arc above -->
  <path d="M 140 160 Q 256 100 372 160" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Subtle orbital arc below -->
  <path d="M 140 352 Q 256 412 372 352" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Tiny stars -->
  <circle cx="380" cy="140" r="2" fill="#C9A96E" opacity="0.3"/>
  <circle cx="132" cy="380" r="1.5" fill="#C9A96E" opacity="0.25"/>
  <circle cx="400" cy="360" r="1.5" fill="#C9A96E" opacity="0.2"/>
</svg>
