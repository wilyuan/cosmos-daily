<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#16132A"/>
      <stop offset="100%" stop-color="#0A0912"/>
    </radialGradient>
    <linearGradient id="gold8" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#e8d09a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="coronaGlow8" cx="55%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#C9A96E" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0A0912" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg8)"/>
  <rect width="512" height="512" rx="96" fill="url(#coronaGlow8)"/>
  <!-- Outer orbit -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Corona ring (bold, bright) -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#gold8)" stroke-width="5" stroke-opacity="0.9"/>
  <!-- Softer inner corona -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Dark body -->
  <circle cx="256" cy="256" r="90" fill="#0A0912"/>
  <!-- Inner rim glow -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.25"/>
  <!-- Corona rays (bold, 8 directions) -->
  <g stroke="url(#gold8)" stroke-linecap="round">
    <!-- Cardinals (longer) -->
    <line x1="256" y1="138" x2="256" y2="108" stroke-width="3" opacity="0.7"/>
    <line x1="256" y1="374" x2="256" y2="404" stroke-width="3" opacity="0.7"/>
    <line x1="138" y1="256" x2="108" y2="256" stroke-width="3" opacity="0.7"/>
    <line x1="374" y1="256" x2="404" y2="256" stroke-width="3" opacity="0.7"/>
    <!-- Diagonals (shorter) -->
    <line x1="172" y1="172" x2="152" y2="152" stroke-width="2" opacity="0.45"/>
    <line x1="340" y1="172" x2="360" y2="152" stroke-width="2" opacity="0.45"/>
    <line x1="172" y1="340" x2="152" y2="360" stroke-width="2" opacity="0.45"/>
    <line x1="340" y1="340" x2="360" y2="360" stroke-width="2" opacity="0.45"/>
  </g>
  <!-- Planet on orbit -->
  <circle cx="456" cy="256" r="10" fill="url(#gold8)" opacity="0.85"/>
  <!-- Tiny distant planet -->
  <circle cx="56" cy="256" r="5" fill="#C9A96E" opacity="0.3"/>
</svg>
