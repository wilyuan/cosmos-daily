<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12101A"/>
      <stop offset="100%" stop-color="#07060D"/>
    </radialGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <linearGradient id="goldFaint1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a08050" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>
  <!-- Outer ring (orbit) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldFaint1)" stroke-width="1.5"/>
  <!-- Eclipse: outer sun corona -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="url(#gold1)" stroke-width="2.5"/>
  <!-- Eclipse: dark moon covering sun -->
  <circle cx="256" cy="256" r="68" fill="#07060D"/>
  <circle cx="256" cy="256" r="68" fill="none" stroke="url(#gold1)" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Corona rays -->
  <g opacity="0.5" stroke="url(#gold1)" stroke-width="1.5" stroke-linecap="round">
    <line x1="256" y1="160" x2="256" y2="136"/>
    <line x1="256" y1="352" x2="256" y2="376"/>
    <line x1="160" y1="256" x2="136" y2="256"/>
    <line x1="352" y1="256" x2="376" y2="256"/>
    <line x1="188" y1="188" x2="171" y2="171"/>
    <line x1="324" y1="188" x2="341" y2="171"/>
    <line x1="188" y1="324" x2="171" y2="341"/>
    <line x1="324" y1="324" x2="341" y2="341"/>
  </g>
  <!-- Small planet on orbit -->
  <circle cx="436" cy="256" r="8" fill="url(#gold1)"/>
  <!-- Tiny second planet -->
  <circle cx="136" cy="132" r="4" fill="#C9A96E" opacity="0.4"/>
</svg>
