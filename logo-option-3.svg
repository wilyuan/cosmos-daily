<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12101A"/>
      <stop offset="100%" stop-color="#07060D"/>
    </radialGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b07a"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <radialGradient id="centerGlow3" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#07060D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>
  <rect width="512" height="512" rx="96" fill="url(#centerGlow3)"/>
  <!-- Three concentric orbital rings (like the radial map) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Tilted elliptical orbit -->
  <ellipse cx="256" cy="256" rx="160" ry="55" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.15" transform="rotate(-20, 256, 256)"/>
  <!-- Center body: crescent moon / eclipse -->
  <circle cx="256" cy="256" r="36" fill="url(#gold3)" opacity="0.9"/>
  <circle cx="244" cy="248" r="30" fill="#07060D"/>
  <!-- Event dots on orbits (like constellation points) -->
  <!-- Inner ring -->
  <circle cx="256" cy="176" r="5" fill="#E84545" opacity="0.8"/>
  <circle cx="322" cy="298" r="4" fill="#C9A96E" opacity="0.7"/>
  <circle cx="190" cy="220" r="3.5" fill="#8B7EC7" opacity="0.7"/>
  <!-- Middle ring -->
  <circle cx="386" cy="256" r="5.5" fill="#E07A2F" opacity="0.75"/>
  <circle cx="170" cy="330" r="4" fill="#4A90D9" opacity="0.6"/>
  <circle cx="310" cy="150" r="3" fill="#6B9E9E" opacity="0.6"/>
  <!-- Outer ring -->
  <circle cx="436" cy="220" r="4.5" fill="#E84545" opacity="0.6"/>
  <circle cx="100" cy="310" r="3.5" fill="#C9A96E" opacity="0.5"/>
  <circle cx="340" cy="410" r="3" fill="#8B7EC7" opacity="0.5"/>
  <circle cx="76" cy="230" r="2.5" fill="#E07A2F" opacity="0.4"/>
  <!-- Faint connecting lines (constellation effect) -->
  <g stroke="#C9A96E" stroke-width="0.5" stroke-opacity="0.08">
    <line x1="256" y1="176" x2="322" y2="298"/>
    <line x1="322" y1="298" x2="386" y2="256"/>
    <line x1="190" y1="220" x2="170" y2="330"/>
    <line x1="310" y1="150" x2="436" y2="220"/>
  </g>
</svg>
